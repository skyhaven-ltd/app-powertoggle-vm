name: PR Validation

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "docs/**"

permissions: {}

jobs:
  ValidateBase:
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    uses: skyhaven-ltd/pipeline-engineering-github-actions/.github/workflows/reusable-terraform.yml@6cfa143b42ff464e4101d69c09945db9fac369e5 # v2.0.0
    with:
      working_directory: infra/base
      state_key: infra-base.tfstate
      environments: '["dev","prd"]'
      # State was written by Terraform 1.14.9, so stay at or above it.
      terraform_version: "1.14.9"

  ValidateEventGrid:
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    uses: skyhaven-ltd/pipeline-engineering-github-actions/.github/workflows/reusable-terraform.yml@6cfa143b42ff464e4101d69c09945db9fac369e5 # v2.0.0
    with:
      working_directory: infra/eventgrid
      state_key: infra-eventgrid.tfstate
      environments: '["dev","prd"]'
      terraform_version: "1.14.9"
