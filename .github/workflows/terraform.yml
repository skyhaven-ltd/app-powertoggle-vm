name: "Terraform"

on:
  push:
    branches:
      - main
      - "major/**"
      - "minor/**"
      - "patch/**"
    paths:
      - "infra/base/**"
      - "infra/eventgrid/**"
  workflow_dispatch:
    inputs:
      env:
        description: "Environment"
        type: choice
        default: dev
        options:
          - dev
          - prd
      terraform_action:
        description: "Terraform Action"
        type: choice
        default: plan
        options:
          - plan
          - apply
          - destroy

permissions:
  contents: read
  id-token: write

concurrency:
  group: terraform-${{ github.repository }}
  cancel-in-progress: false

jobs:
  Terraform:
    name: "Terraform ${{ inputs.terraform_action || (github.ref == 'refs/heads/main' && 'apply' || 'plan') }} (${{ inputs.env || (github.ref == 'refs/heads/main' && 'prd' || 'dev') }})"
    runs-on: ubuntu-latest
    environment: ${{ inputs.env || (github.ref == 'refs/heads/main' && 'prd' || 'dev') }}
    env:
      ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      ARM_USE_OIDC: "true"
      TF_ACTION: ${{ inputs.terraform_action || (github.ref == 'refs/heads/main' && 'apply' || 'plan') }}
      TF_ENV: ${{ inputs.env || (github.ref == 'refs/heads/main' && 'prd' || 'dev') }}
      EVENTGRID_FUNCTION_NAME: TagIngest
    steps:
      - name: "Checkout"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: "Setup Terraform"
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e
        with:
          terraform_version: "1.14.9"

      - name: "Azure Login"
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_PLATFORM_SUBSCRIPTION_ID }}

      - name: "Ensure State Container"
        uses: skyhaven-ltd/pipeline-engineering-github-actions/actions/ensure-tfstate-container@6cfa143b42ff464e4101d69c09945db9fac369e5
        with:
          storage_account_name: stplatform${{ env.TF_ENV }}uks02
          container_name: ${{ github.event.repository.name }}
          login: "false"

      - name: "Terraform Init - Base Stack"
        uses: skyhaven-ltd/pipeline-engineering-github-actions/actions/terraform-backend-init@6cfa143b42ff464e4101d69c09945db9fac369e5
        with:
          environment: ${{ env.TF_ENV }}
          working_directory: infra/base
          state_key: infra-base.tfstate
          platform_subscription_id: ${{ vars.AZURE_PLATFORM_SUBSCRIPTION_ID }}
          container_name: ${{ github.event.repository.name }}

      - name: "Terraform Init - Event Grid Stack"
        uses: skyhaven-ltd/pipeline-engineering-github-actions/actions/terraform-backend-init@6cfa143b42ff464e4101d69c09945db9fac369e5
        with:
          environment: ${{ env.TF_ENV }}
          working_directory: infra/eventgrid
          state_key: infra-eventgrid.tfstate
          platform_subscription_id: ${{ vars.AZURE_PLATFORM_SUBSCRIPTION_ID }}
          container_name: ${{ github.event.repository.name }}

      - name: "Terraform Plan - Base Stack"
        if: env.TF_ACTION == 'plan'
        run: |
          terraform -chdir=infra/base plan \
            -var-file="vars/globals.tfvars" \
            -var-file="vars/${TF_ENV}.tfvars"

      - name: "Terraform Plan - Event Grid Stack"
        if: env.TF_ACTION == 'plan'
        run: |
          terraform -chdir=infra/eventgrid plan \
            -var-file="vars/globals.tfvars" \
            -var-file="vars/${TF_ENV}.tfvars"

      - name: "Setup Node"
        if: env.TF_ACTION == 'apply'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22.x"

      - name: "Build Functions"
        if: env.TF_ACTION == 'apply'
        run: |
          set -euo pipefail
          cd functions/src
          npm ci
          npm run build --if-present
          npm prune --omit=dev

      - name: "Zip Functions"
        if: env.TF_ACTION == 'apply'
        run: |
          set -euo pipefail
          cd functions/src
          zip -r "${{ runner.temp }}/functionapp.zip" .

      - name: "Terraform Apply - Base Stack"
        if: env.TF_ACTION == 'apply'
        run: |
          terraform -chdir=infra/base apply -auto-approve \
            -var-file="vars/globals.tfvars" \
            -var-file="vars/${TF_ENV}.tfvars"

      - name: "Azure Login - Workload Subscription"
        if: env.TF_ACTION == 'apply'
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: "Deploy Function App Code"
        if: env.TF_ACTION == 'apply'
        run: |
          set -euo pipefail

          RESOURCE_GROUP_NAME="$(terraform -chdir=infra/base output -raw resource_group_name)"
          FUNCTION_APP_NAME="$(terraform -chdir=infra/base output -raw function_app_name)"

          az functionapp deployment source config-zip \
            --resource-group "$RESOURCE_GROUP_NAME" \
            --name "$FUNCTION_APP_NAME" \
            --src "${{ runner.temp }}/functionapp.zip"

      - name: "Wait for Function Registration in ARM"
        if: env.TF_ACTION == 'apply'
        run: |
          set -euo pipefail

          RG="$(terraform -chdir=infra/base output -raw resource_group_name)"
          APP="$(terraform -chdir=infra/base output -raw function_app_name)"
          SUB_ID="$(az account show --query id -o tsv)"
          FUNC_NAME="$EVENTGRID_FUNCTION_NAME"

          for i in $(seq 1 60); do
            if az rest --method get \
              --url "https://management.azure.com/subscriptions/${SUB_ID}/resourceGroups/${RG}/providers/Microsoft.Web/sites/${APP}/functions/${FUNC_NAME}?api-version=2022-03-01" \
              >/dev/null 2>&1; then
              echo "Function ${FUNC_NAME} is now visible in ARM"
              exit 0
            fi
            echo "Waiting for function to be visible... (attempt $i/60)"
            sleep 10
          done

          echo "::error::Function not visible in ARM after 10 minutes"
          exit 1

      - name: "Terraform Apply - Event Grid Stack"
        if: env.TF_ACTION == 'apply'
        run: |
          terraform -chdir=infra/eventgrid apply -auto-approve \
            -var-file="vars/globals.tfvars" \
            -var-file="vars/${TF_ENV}.tfvars"

      - name: "Terraform Destroy - Event Grid Stack"
        if: env.TF_ACTION == 'destroy'
        run: |
          terraform -chdir=infra/eventgrid destroy -auto-approve \
            -var-file="vars/globals.tfvars" \
            -var-file="vars/${TF_ENV}.tfvars"

      - name: "Terraform Destroy - Base Stack"
        if: env.TF_ACTION == 'destroy'
        run: |
          terraform -chdir=infra/base destroy -auto-approve \
            -var-file="vars/globals.tfvars" \
            -var-file="vars/${TF_ENV}.tfvars"

      - name: "Break State Lease - Event Grid Stack"
        if: always()
        uses: skyhaven-ltd/pipeline-engineering-github-actions/actions/break-tfstate-lease@6cfa143b42ff464e4101d69c09945db9fac369e5
        with:
          storage_account_name: stplatform${{ env.TF_ENV }}uks02
          container_name: ${{ github.event.repository.name }}
          state_key: infra-eventgrid.tfstate
          login: "false"

      - name: "Break State Lease - Base Stack"
        if: always()
        uses: skyhaven-ltd/pipeline-engineering-github-actions/actions/break-tfstate-lease@6cfa143b42ff464e4101d69c09945db9fac369e5
        with:
          storage_account_name: stplatform${{ env.TF_ENV }}uks02
          container_name: ${{ github.event.repository.name }}
          state_key: infra-base.tfstate
          login: "false"
