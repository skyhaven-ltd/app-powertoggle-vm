name: "Terraform"

on:
  push:
    branches:
      - "major/**"
      - "minor/**"
      - "patch/**"
    paths:
      - "infra/**"
      - "functions/**"
  workflow_dispatch:
    inputs:
      env:
        description: "Environment"
        type: choice
        default: dev
        options:
          - dev
          - prd
      terraform_action:
        description: "Terraform Action"
        type: choice
        default: plan
        options:
          - plan
          - apply
          - destroy

permissions:
  contents: read
  id-token: write

env:
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_USE_OIDC: true

jobs:
  build-functions:
    name: "Build Functions"
    if: inputs.terraform_action == 'apply' || inputs.terraform_action == ''
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: "Setup Node"
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"

      - name: "Build Functions"
        run: |
          set -euo pipefail
          cd functions/src
          npm ci
          npm run build --if-present
          npm prune --omit=dev

      - name: "Zip Functions"
        run: |
          cd functions/src
          zip -r ${{ runner.temp }}/functionapp.zip .

      - name: "Upload Artifact"
        uses: actions/upload-artifact@v4
        with:
          name: functionapp
          path: ${{ runner.temp }}/functionapp.zip
          retention-days: 1

  plan:
    name: "Terraform Plan (${{ inputs.env || 'dev' }})"
    if: inputs.terraform_action == 'plan'
    runs-on: ubuntu-latest
    environment: ${{ inputs.env || 'dev' }}
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: "Terraform Plan"
        uses: ./.github/actions/terraform-run
        with:
          command: plan
          env: ${{ inputs.env || 'dev' }}
          extra_args: '-var="enable_eventgrid_subscription=true"'
          azure_client_id: ${{ secrets.AZURE_CLIENT_ID }}
          azure_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
          azure_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          azure_platform_subscription_id: ${{ secrets.AZURE_PLATFORM_SUBSCRIPTION_ID }}
          repo_name: ${{ github.event.repository.name }}

  apply:
    name: "Terraform Apply (${{ inputs.env || 'dev' }})"
    if: inputs.terraform_action == 'apply'
    needs: build-functions
    runs-on: ubuntu-latest
    environment: ${{ inputs.env || 'dev' }}
    env:
      TF_ENV: ${{ inputs.env || 'dev' }}
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: "Download Functions Artifact"
        uses: actions/download-artifact@v4
        with:
          name: functionapp
          path: ${{ runner.temp }}

      - name: "Setup Terraform"
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_wrapper: false

      - name: "Azure Login"
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: "Ensure State Container"
        uses: ./.github/actions/ensure-tfstate-container
        with:
          storage_account_name: sttfsplatform${{ env.TF_ENV }}uks01
          container_name: ${{ github.event.repository.name }}
          azure_client_id: ${{ secrets.AZURE_CLIENT_ID }}
          azure_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
          azure_subscription_id: ${{ secrets.AZURE_PLATFORM_SUBSCRIPTION_ID }}

      - name: "Terraform Init"
        env:
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          terraform -chdir=infra init \
            -backend-config="resource_group_name=rg-tfs-platform-$TF_ENV-uks-01" \
            -backend-config="storage_account_name=sttfsplatform${TF_ENV}uks01" \
            -backend-config="container_name=$REPO_NAME" \
            -backend-config="key=terraform.tfstate" \
            -backend-config="subscription_id=${{ secrets.AZURE_PLATFORM_SUBSCRIPTION_ID }}"

      # ── Phase 1: Infrastructure (Event Grid subscription disabled) ──
      - name: "Terraform Apply — Infrastructure"
        run: |
          terraform -chdir=infra apply -auto-approve \
            -var-file="vars/globals.tfvars" \
            -var-file="vars/$TF_ENV.tfvars"

      # ── Deploy Function Code ──
      - name: "Deploy Function App Code"
        run: |
          az functionapp deployment source config-zip \
            --resource-group "$(terraform -chdir=infra output -raw resource_group_name)" \
            --name "$(terraform -chdir=infra output -raw function_app_name)" \
            --src "${{ runner.temp }}/functionapp.zip"

      - name: "Wait for Function Registration in ARM"
        run: |
          set -euo pipefail

          RG="$(terraform -chdir=infra output -raw resource_group_name)"
          APP="$(terraform -chdir=infra output -raw function_app_name)"
          SUB_ID="$(az account show --query id -o tsv)"
          FUNC_NAME="TagIngest"

          for i in $(seq 1 60); do
            if az rest --method get \
              --url "https://management.azure.com/subscriptions/${SUB_ID}/resourceGroups/${RG}/providers/Microsoft.Web/sites/${APP}/functions/${FUNC_NAME}?api-version=2022-03-01" \
              >/dev/null 2>&1; then
              echo "Function ${FUNC_NAME} is now visible in ARM"
              exit 0
            fi
            echo "Waiting for function to be visible... (attempt $i/60)"
            sleep 10
          done
          echo "::error::Function not visible in ARM after 10 minutes"
          exit 1

      # ── Phase 2: Full apply (creates Event Grid subscription) ──
      - name: "Terraform Apply — Event Grid Subscription"
        run: |
          terraform -chdir=infra apply -auto-approve \
            -var-file="vars/globals.tfvars" \
            -var-file="vars/$TF_ENV.tfvars" \
            -var="enable_eventgrid_subscription=true"

      - name: "Break State Lease"
        if: always()
        uses: ./.github/actions/break-tfstate-lease
        with:
          storage_account_name: sttfsplatform${{ env.TF_ENV }}uks01
          container_name: ${{ github.event.repository.name }}
          azure_client_id: ${{ secrets.AZURE_CLIENT_ID }}
          azure_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
          azure_subscription_id: ${{ secrets.AZURE_PLATFORM_SUBSCRIPTION_ID }}

  destroy:
    name: "Terraform Destroy (${{ inputs.env || 'dev' }})"
    if: inputs.terraform_action == 'destroy'
    runs-on: ubuntu-latest
    environment: ${{ inputs.env || 'dev' }}
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: "Terraform Destroy"
        uses: ./.github/actions/terraform-run
        with:
          command: destroy
          env: ${{ inputs.env || 'dev' }}
          extra_args: '-auto-approve -var="enable_eventgrid_subscription=true"'
          terraform_wrapper: "false"
          azure_client_id: ${{ secrets.AZURE_CLIENT_ID }}
          azure_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
          azure_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          azure_platform_subscription_id: ${{ secrets.AZURE_PLATFORM_SUBSCRIPTION_ID }}
          repo_name: ${{ github.event.repository.name }}
