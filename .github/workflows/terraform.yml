name: "Terraform"

on:
  push:
    branches:
      - "major/**"
      - "minor/**"
      - "patch/**"
    paths:
      - "infra/base/**"
      - "infra/eventgrid/**"
  workflow_dispatch:
    inputs:
      env:
        description: "Environment"
        type: choice
        default: dev
        options:
          - dev
          - prd
      terraform_action:
        description: "Terraform Action"
        type: choice
        default: plan
        options:
          - plan
          - apply
          - destroy

permissions:
  contents: read
  id-token: write

jobs:
  # Plan, apply, or destroy Terraform infrastructure
  terraform:
    name: "Terraform ${{ inputs.terraform_action || 'plan' }} (${{ inputs.env || 'dev' }})"
    runs-on: ubuntu-latest
    environment: ${{ inputs.env || 'dev' }}
    env:
      ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      ARM_USE_OIDC: true
      EVENTGRID_FUNCTION_NAME: TagIngest
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: "Setup Terraform"
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3

      - name: "Ensure State Container"
        uses: ./.github/actions/ensure-tfstate-container
        with:
          storage_account_name: stplatform${{ inputs.env || 'dev' }}uks02
          container_name: ${{ github.event.repository.name }}
          azure_client_id: ${{ vars.AZURE_CLIENT_ID }}
          azure_tenant_id: ${{ vars.AZURE_TENANT_ID }}
          azure_subscription_id: ${{ vars.AZURE_PLATFORM_SUBSCRIPTION_ID }}

      - name: "Terraform Init - Base Stack"
        env:
          TF_ENV: ${{ inputs.env || 'dev' }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          terraform -chdir=infra/base init \
            -backend-config="resource_group_name=rg-platform-$TF_ENV-uks-01" \
            -backend-config="storage_account_name=stplatform${TF_ENV}uks02" \
            -backend-config="container_name=$REPO_NAME" \
            -backend-config="key=infra-base.tfstate" \
            -backend-config="subscription_id=${{ vars.AZURE_PLATFORM_SUBSCRIPTION_ID }}"

      - name: "Terraform Init - Event Grid Stack"
        env:
          TF_ENV: ${{ inputs.env || 'dev' }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          terraform -chdir=infra/eventgrid init \
            -backend-config="resource_group_name=rg-platform-$TF_ENV-uks-01" \
            -backend-config="storage_account_name=stplatform${TF_ENV}uks02" \
            -backend-config="container_name=$REPO_NAME" \
            -backend-config="key=infra-eventgrid.tfstate" \
            -backend-config="subscription_id=${{ vars.AZURE_PLATFORM_SUBSCRIPTION_ID }}"

      - name: "Terraform Plan - Base Stack"
        if: inputs.terraform_action == 'plan' || inputs.terraform_action == ''
        env:
          TF_ENV: ${{ inputs.env || 'dev' }}
        run: |
          terraform -chdir=infra/base plan \
            -var-file="vars/globals.tfvars" \
            -var-file="vars/$TF_ENV.tfvars"

      - name: "Terraform Plan - Event Grid Stack"
        if: inputs.terraform_action == 'plan' || inputs.terraform_action == ''
        env:
          TF_ENV: ${{ inputs.env || 'dev' }}
        run: |
          terraform -chdir=infra/eventgrid plan \
            -var-file="vars/globals.tfvars" \
            -var-file="vars/$TF_ENV.tfvars"

      - name: "Setup Node"
        if: inputs.terraform_action == 'apply'
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"

      - name: "Build Functions"
        if: inputs.terraform_action == 'apply'
        run: |
          set -euo pipefail
          cd functions/src
          npm ci
          npm run build --if-present
          npm prune --omit=dev

      - name: "Zip Functions"
        if: inputs.terraform_action == 'apply'
        run: |
          set -euo pipefail
          cd functions/src
          zip -r "${{ runner.temp }}/functionapp.zip" .

      - name: "Terraform Apply - Base Stack"
        if: inputs.terraform_action == 'apply'
        env:
          TF_ENV: ${{ inputs.env || 'dev' }}
        run: |
          terraform -chdir=infra/base apply -auto-approve \
            -var-file="vars/globals.tfvars" \
            -var-file="vars/$TF_ENV.tfvars"

      - name: "Azure Login"
        if: inputs.terraform_action == 'apply'
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: "Deploy Function App Code"
        if: inputs.terraform_action == 'apply'
        run: |
          set -euo pipefail

          RESOURCE_GROUP_NAME="$(terraform -chdir=infra/base output -raw resource_group_name)"
          FUNCTION_APP_NAME="$(terraform -chdir=infra/base output -raw function_app_name)"

          az functionapp deployment source config-zip \
            --resource-group "$RESOURCE_GROUP_NAME" \
            --name "$FUNCTION_APP_NAME" \
            --src "${{ runner.temp }}/functionapp.zip"

      - name: "Wait for Function Registration in ARM"
        if: inputs.terraform_action == 'apply'
        run: |
          set -euo pipefail

          RG="$(terraform -chdir=infra/base output -raw resource_group_name)"
          APP="$(terraform -chdir=infra/base output -raw function_app_name)"
          SUB_ID="$(az account show --query id -o tsv)"
          FUNC_NAME="$EVENTGRID_FUNCTION_NAME"

          for i in $(seq 1 60); do
            if az rest --method get \
              --url "https://management.azure.com/subscriptions/${SUB_ID}/resourceGroups/${RG}/providers/Microsoft.Web/sites/${APP}/functions/${FUNC_NAME}?api-version=2022-03-01" \
              >/dev/null 2>&1; then
              echo "Function ${FUNC_NAME} is now visible in ARM"
              exit 0
            fi
            echo "Waiting for function to be visible... (attempt $i/60)"
            sleep 10
          done

          echo "::error::Function not visible in ARM after 10 minutes"
          exit 1

      - name: "Terraform Apply - Event Grid Stack"
        if: inputs.terraform_action == 'apply'
        env:
          TF_ENV: ${{ inputs.env || 'dev' }}
        run: |
          terraform -chdir=infra/eventgrid apply -auto-approve \
            -var-file="vars/globals.tfvars" \
            -var-file="vars/$TF_ENV.tfvars"

      - name: "Terraform Destroy - Event Grid Stack"
        if: inputs.terraform_action == 'destroy'
        env:
          TF_ENV: ${{ inputs.env || 'dev' }}
        run: |
          terraform -chdir=infra/eventgrid destroy -auto-approve \
            -var-file="vars/globals.tfvars" \
            -var-file="vars/$TF_ENV.tfvars"

      - name: "Terraform Destroy - Base Stack"
        if: inputs.terraform_action == 'destroy'
        env:
          TF_ENV: ${{ inputs.env || 'dev' }}
        run: |
          terraform -chdir=infra/base destroy -auto-approve \
            -var-file="vars/globals.tfvars" \
            -var-file="vars/$TF_ENV.tfvars"

      - name: "Break State Lease - Event Grid Stack"
        if: always()
        uses: ./.github/actions/break-tfstate-lease
        with:
          storage_account_name: stplatform${{ inputs.env || 'dev' }}uks02
          container_name: ${{ github.event.repository.name }}
          state_key: infra-eventgrid.tfstate
          azure_client_id: ${{ vars.AZURE_CLIENT_ID }}
          azure_tenant_id: ${{ vars.AZURE_TENANT_ID }}
          azure_subscription_id: ${{ vars.AZURE_PLATFORM_SUBSCRIPTION_ID }}

      - name: "Break State Lease - Base Stack"
        if: always()
        uses: ./.github/actions/break-tfstate-lease
        with:
          storage_account_name: stplatform${{ inputs.env || 'dev' }}uks02
          container_name: ${{ github.event.repository.name }}
          state_key: infra-base.tfstate
          azure_client_id: ${{ vars.AZURE_CLIENT_ID }}
          azure_tenant_id: ${{ vars.AZURE_TENANT_ID }}
          azure_subscription_id: ${{ vars.AZURE_PLATFORM_SUBSCRIPTION_ID }}
